name: Release extension

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      publish:
        description: Publish to Open VSX and create the VS Marketplace upload task
        required: true
        type: boolean
        default: false

permissions:
  contents: write
  issues: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Test, package, and publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Validate release metadata
        id: metadata
        env:
          MANUAL_PUBLISH: ${{ inputs.publish }}
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          vsix="dynasense-${version}.vsix"
          publish=false

          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            tag_version="${GITHUB_REF_NAME#v}"
            if [[ "${tag_version}" != "${version}" ]]; then
              echo "Tag ${GITHUB_REF_NAME} does not match package.json version ${version}." >&2
              exit 1
            fi
            git fetch --no-tags origin master
            if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/master; then
              echo "Tagged commit must be contained in origin/master." >&2
              exit 1
            fi
            publish=true
          elif [[ "${MANUAL_PUBLISH}" == "true" ]]; then
            if [[ "${GITHUB_REF_NAME}" != "master" ]]; then
              echo "Manual publishing is allowed only from master." >&2
              exit 1
            fi
            publish=true
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "vsix=${vsix}" >> "${GITHUB_OUTPUT}"
          echo "publish=${publish}" >> "${GITHUB_OUTPUT}"

      - name: Run tests
        run: npm test

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Package extension
        run: npx --no-install vsce package --out "${{ steps.metadata.outputs.vsix }}"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: dynasense-${{ steps.metadata.outputs.version }}
          path: ${{ steps.metadata.outputs.vsix }}
          if-no-files-found: error
          retention-days: 14

      - name: Verify Open VSX credentials
        if: steps.metadata.outputs.publish == 'true'
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        shell: bash
        run: |
          set -euo pipefail
          [[ -n "${OVSX_PAT}" ]] || { echo "Missing repository secret: OVSX_PAT" >&2; exit 1; }

      - name: Publish to Open VSX
        if: steps.metadata.outputs.publish == 'true'
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: npx --no-install ovsx --pat "$OVSX_PAT" publish "${{ steps.metadata.outputs.vsix }}" --skip-duplicate

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: DynaSense ${{ steps.metadata.outputs.version }}
          files: ${{ steps.metadata.outputs.vsix }}
          generate_release_notes: true
          append_body: true
          body_path: .github/release-appendix.md

      - name: Create VS Marketplace upload task
        if: steps.metadata.outputs.publish == 'true'
        uses: actions/github-script@v7
        env:
          RELEASE_VERSION: ${{ steps.metadata.outputs.version }}
        with:
          script: |
            const coordinator = require('./.github/scripts/marketplace-release.cjs');
            const issue = await coordinator.ensureMarketplaceUploadIssue({
              github,
              context,
              version: process.env.RELEASE_VERSION
            });
            core.info(`VS Marketplace upload issue: #${issue.number}`);
